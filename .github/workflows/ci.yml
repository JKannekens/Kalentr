name: CI

on:
  push:
    branches: [main]
  pull_request:

# Dummy value so the `prisma generate` postinstall and the typecheck succeed
# without a real database — CI never connects to Postgres.
env:
  DATABASE_URL: "postgresql://user:pass@localhost:5432/db"

jobs:
  verify:
    name: Typecheck & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint . --max-warnings 0

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm run test:run
